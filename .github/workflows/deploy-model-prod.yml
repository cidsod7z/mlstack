name: Prod Model Deployment for cjc-ml
'on':
  workflow_dispatch:
    inputs:
      modelUri:
        type: string
        description: URI of model to deploy, in the format models:/<model-name>/<version-id>
        required: true
env:
  DATABRICKS_HOST: https://adb-xxxx.xx.azuredatabricks.net
  NODE_TYPE_ID: Standard_D3_v2
jobs:
  prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    - name: Generate AAD Token
      run: ./.github/workflows/scripts/generate-aad-token.sh ${{ secrets.prodAzureSpTenantId
        }} ${{ secrets.prodAzureSpApplicationId }} ${{ secrets.prodAzureSpClientSecret
        }}
    - name: Deploy model
      env:
        MLFLOW_TRACKING_URI: databricks
      run: 'pip install mlflow

        python steps/deploy.py "${{ github.event.inputs.modelUri }}" "prod"

        '
